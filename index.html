<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TÉCNICO - CONNECTTO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a252f; color: white; min-height: 100vh; display: flex; align-items: center; margin: 0; padding: 20px 0; font-family: 'Segoe UI', sans-serif; }
        .card-menu { 
            background: #2c3e50; border: 2px solid #28a745; transition: 0.3s; cursor: pointer;
            text-decoration: none; color: white; height: 180px; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .card-menu:hover { background: #34495e; transform: translateY(-5px); border-color: #2ecc71; color: white; }
        .icon { font-size: 2.2rem; margin-bottom: 10px; }
        
        .summary-section { background: rgba(44, 62, 80, 0.8); border-radius: 20px; padding: 25px; margin-top: 30px; border: 1px solid #34495e; }
        .stat-card { background: rgba(26, 37, 47, 0.6); border-radius: 12px; padding: 15px; border-bottom: 4px solid #28a745; }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #2ecc71; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; font-weight: 600; }
        .section-title { color: #f1c40f; font-size: 0.8rem; margin-bottom: 15px; text-align: left; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container text-center">
    <h1 class="mb-1 fw-bold text-uppercase">CONNECTTO</h1>
    <p class="mb-5 text-opacity-50">Panel Operativo Central</p>
    
    <div class="row g-4 justify-content-center mb-4">
        <div class="col-6 col-md-5">
            <a href="https://coriajavieragustin-cpu.github.io/gestion-preventivos/Preventivos.html" class="card card-menu rounded-4 shadow">
                <div class="icon">📍</div>
                <h5>Preventivos</h5>
            </a>
        </div>
        <div class="col-6 col-md-5">
            <a href="https://coriajavieragustin-cpu.github.io/gestion-preventivos/Tecnicos.html" class="card card-menu rounded-4 shadow">
                <div class="icon">📊</div>
                <h5>Técnicos</h5>
            </a>
        </div>
    </div>

    <div class="summary-section shadow">
        <div class="row g-3">
            <div class="col-12"><h6 class="section-title">👥 Resumen Personal <span id="nombre-mes" class="text-white opacity-50 small"></span></h6></div>
            <div class="col-6">
                <div class="stat-card">
                    <span class="stat-number" id="tareas-mes">...</span>
                    <span class="stat-label">Tareas (Mes)</span>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-card">
                    <span class="stat-number" id="promedio-tecnicos">...</span>
                    <span class="stat-label">Promedio Gral.</span>
                </div>
            </div>

            <div class="col-12 mt-4"><h6 class="section-title">📊 Resumen Preventivos</h6></div>
            <div class="col-4">
                <div class="stat-card" style="border-color: #9b59b6;"><span class="stat-number" id="prev-totales" style="color: #9b59b6;">0</span><span class="stat-label">Totales</span></div>
            </div>
            <div class="col-4">
                <div class="stat-card" style="border-color: #3498db;"><span class="stat-number" id="prev-finalizados" style="color: #3498db;">0</span><span class="stat-label">OK</span></div>
            </div>
            <div class="col-4">
                <div class="stat-card" style="border-color: #e74c3c;"><span class="stat-number" id="prev-pendientes" style="color: #e74c3c;">0</span><span class="stat-label">Pend.</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // IMPORTANTE: Verifica que esta URL sea la de tu última implementación
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwucQla1oB7mDMiTm0xTjRM_YYbthYU0_-eEnEnyMGpvat-PqBjlRqt-MjMe-j4Rre5Mw/exec";

    async function cargarDashboard() {
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const fecha = new Date();
        const nombreMesSimple = meses[fecha.getMonth()]; 
        document.getElementById('nombre-mes').innerText = `(${nombreMesSimple})`;

        try {
            // 1. Resumen de Técnicos (Pestaña del mes actual)
            const respTec = await fetch(`${WEB_APP_URL}?action=resumen&mes=${nombreMesSimple}`);
            const dataTec = await respTec.json();
            document.getElementById('tareas-mes').innerText = dataTec.tareas || 0;
            document.getElementById('promedio-tecnicos').innerText = dataTec.promedio || 0;

            // 2. Resumen de Preventivos (Pestaña "Datos")
            const respPrev = await fetch(`${WEB_APP_URL}?action=resumen_preventivos`);
            const dataPrev = await respPrev.json();
            document.getElementById('prev-totales').innerText = dataPrev.totales || 0;
            document.getElementById('prev-finalizados').innerText = dataPrev.ok || 0;
            document.getElementById('prev-pendientes').innerText = dataPrev.pendientes || 0;
            
        } catch (error) {
            console.error("Error cargando datos:", error);
            document.getElementById('tareas-mes').innerText = "0";
            document.getElementById('promedio-tecnicos').innerText = "0";
        }
    }

    window.onload = cargarDashboard;
</script>

</body>
</html>
