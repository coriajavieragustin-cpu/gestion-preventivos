<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECTTO - Control Total</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f111a;
            --sidebar-bg: #1e1e2d;
            --card-bg: #161b22;
            --tec-color: #009ef7;
            --prev-color: #50cd89;
            --text-muted: #8b949e;
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* Layout Principal */
        .wrapper { display: flex; height: 100vh; }
        
        /* Sidebar Compacta */
        .sidebar { width: 200px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid #2b2b40; flex-shrink: 0; }
        .sidebar h5 { font-size: 1rem; color: var(--tec-color); margin-bottom: 25px; text-align: center; }
        .btn-nav { width: 100%; text-align: left; background: transparent; color: #a1a5b7; border: none; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-decoration: none; display: block; transition: 0.2s; }
        .btn-nav:hover { background: #2b2b40; color: white; }

        /* Contenedor de Paneles */
        .main-content { display: flex; flex-grow: 1; overflow: hidden; }
        .panel { flex: 1; padding: 20px; overflow-y: auto; border-right: 1px solid #30363d; }
        .panel-prev { background-color: #0d1117; border-right: none; }

        /* Elementos UI chicos */
        .header-mini { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-mini h6 { margin: 0; font-weight: 700; letter-spacing: 1px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .mini-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
        .mini-card .label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .mini-card .value { font-size: 1.2rem; font-weight: 800; display: block; }

        .chart-container { background: var(--card-bg); border-radius: 8px; padding: 15px; border: 1px solid #30363d; }
        select.form-select-sm { font-size: 0.75rem; background: #21262d; color: white; border-color: #30363d; width: auto; }
        
        .btn-direct { font-size: 0.7rem; padding: 4px 10px; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <h5>CONNECTTO</h5>
        <nav>
            <a href="#" class="btn-nav">🏠 Inicio</a>
            <a href="https://coriajavieragustin-cpu.github.io/gestion-preventivos/Tecnicos.html" target="_blank" class="btn-nav">👷 Técnicos</a>
            <a href="https://coriajavieragustin-cpu.github.io/gestion-preventivos/Preventivos.html" target="_blank" class="btn-nav">🛠️ Preventivos</a>
            <hr style="border-color: #333">
            <a href="#" class="btn-nav">📊 Reportes</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="panel">
            <div class="header-mini">
                <h6 style="color: var(--tec-color)">MODULO TÉCNICOS</h6>
                <select class="form-select form-select-sm">
                    <option>Marzo 2026</option>
                </select>
            </div>

            <div class="stat-grid">
                <div class="mini-card" style="border-left: 3px solid var(--tec-color)">
                    <span class="label">Prom. Mes</span>
                    <span class="value">5.42</span>
                </div>
                <div class="mini-card">
                    <span class="label">Anual</span>
                    <span class="value">4.89</span>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="chartTec" height="180"></canvas>
            </div>
            <a href="https://coriajavieragustin-cpu.github.io/gestion-preventivos/Tecnicos.html" target="_blank" class="btn btn-outline-primary btn-direct">Abrir Gestión</a>
        </div>

        <div class="panel panel-prev">
            <div class="header-mini">
                <h6 style="color: var(--prev-color)">MODULO PREVENTIVOS</h6>
                <select class="form-select form-select-sm">
                    <option>Marzo 2026</option>
                </select>
            </div>

            <div class="stat-grid">
                <div class="mini-card" style="border-left: 3px solid var(--prev-color)">
                    <span class="label">Efectividad</span>
                    <span class="value">92%</span>
                </div>
                <div class="mini-card">
                    <span class="label">Cajas</span>
                    <span class="value">124</span>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="chartPrev" height="180"></canvas>
            </div>
            <a href="https://coriajavieragustin-cpu.github.io/gestion-preventivos/Preventivos.html" target="_blank" class="btn btn-outline-success btn-direct">Abrir Gestión</a>
        </div>
    </div>
</div>

<script>
    const options = {
        plugins: { legend: { position: 'bottom', labels: { color: '#8b949e', boxWidth: 10, font: { size: 9 } } } },
        cutout: '70%',
        responsive: true,
        maintainAspectRatio: false
    };

    window.onload = () => {
        new Chart(document.getElementById('chartTec'), {
            type: 'doughnut',
            data: {
                labels: ['Instalaciones', 'Mantenimiento', 'Bajas'],
                datasets: [{
                    data: [45, 30, 25],
                    backgroundColor: ['#009ef7', '#2e5bff', '#50cd89'],
                    borderWidth: 0
                }]
            },
            options: options
        });

        new Chart(document.getElementById('chartPrev'), {
            type: 'doughnut',
            data: {
                labels: ['Limpieza', 'Picos', 'Nodos'],
                datasets: [{
                    data: [60, 20, 20],
                    backgroundColor: ['#50cd89', '#47be7d', '#2a724b'],
                    borderWidth: 0
                }]
            },
            options: options
        });
    }
</script>
</body>
</html>
