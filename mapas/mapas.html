<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Infraestructura - Corrientes</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        
        /* Estilo para el control de capas */
        .leaflet-control-layers {
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-omnivore/0.3.4/leaflet-omnivore.min.js"></script>

    <script>
        // 1. Inicializar mapa centrado en Corrientes
        var map = L.map('map').setView([-27.469, -58.830], 13);

        // 2. Fondo de mapa (OpenStreetMap)
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. CARGAR TUS CAPAS KMZ
        // Al estar en la misma carpeta, solo usamos el nombre exacto del archivo
        
        var capaInfra = omnivore.kmz('corrientes Infra.kmz').on('ready', function() {
            // Cuando cargue, el mapa se ajusta para mostrar todo
            map.fitBounds(this.getBounds());
        }).addTo(map);

        var capaCD = omnivore.kmz('corrientes cd.kmz').addTo(map);

        // 4. CREAR EL MENÚ DE CONTROL
        // Esto permite apagar y encender cada mapa
        var mapasBase = {
            "Vista Calles": osm
        };

        var capasDatos = {
            "Infraestructura": capaInfra,
            "CD Corrientes": capaCD
        };

        L.control.layers(mapasBase, capasDatos, { collapsed: false }).addTo(map);

    </script>
</body>
</html>
