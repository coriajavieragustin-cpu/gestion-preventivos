<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Stock INFRA</title>
    <style>
        :root { 
            --bg: #0b1120; --card: #1e293b; --accent: #38bdf8; 
            --text: #f1f5f9; --highlight: #22c55e; --border: #334155;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 30px; }
        
        /* Contenedor para título y botón */
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; margin: 0; }
        
        /* Estilo del botón de Sheet */
        .link-sheet {
            background: #10b981; color: white; padding: 10px 20px; 
            border-radius: 8px; text-decoration: none; font-size: 0.9rem; 
            font-weight: 600; transition: background 0.3s;
        }
        .link-sheet:hover { background: #059669; }

        #formulario { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 15px; background: var(--card); padding: 25px; border-radius: 16px; 
            margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        input { padding: 12px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; }
        input:focus { outline: none; border-color: var(--accent); }
        
        .btn-group { grid-column: 1 / -1; display: flex; gap: 15px; justify-content: flex-end; margin-top: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        button:hover { transform: translateY(-2px); }
        
        .main-layout { display: flex; gap: 25px; align-items: flex-start; }
        .table-container { flex: 3; background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { color: var(--accent); padding: 15px; border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; font-size: 14px; }
        tr:hover { background: #2d3748; }
        .val-high { color: var(--highlight); font-weight: bold; }
        
        #resumen-container { flex: 1; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .total-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        .total-item b { color: var(--highlight); }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <h2>Control de Stock Connecto</h2>
        <a href="https://docs.google.com/spreadsheets/d/1WHqJvetykqGbxQmkod6FX83W9fHhhu3W77i-9QxEmwc/edit?usp=drive_link" target="_blank" class="link-sheet">Abrir Google Sheets</a>
    </div>

    <div id="formulario">
        <input type="date" id="c0"> 
        <input type="number" id="c1" placeholder="Tiket">
        <input type="text" id="c2" placeholder="Delegado"> 
        <input type="number" id="c3" placeholder="Metros Oval">
        <input type="number" id="c4" placeholder="Metros ADSS"> 
        <input type="number" id="c5" placeholder="Retencion OV">
        <input type="number" id="c6" placeholder="Cadenas"> 
        <input type="number" id="c7" placeholder="Supas">
        <input type="number" id="c8" placeholder="Ganchos"> 
        <input type="number" id="c9" placeholder="Feleje">
        <input type="number" id="c10" placeholder="Evillas"> 
        <input type="number" id="c11" placeholder="Tornillo N7">
        <input type="number" id="c12" placeholder="Mordaza 3B"> 
        <input type="number" id="c13" placeholder="Mordaza 2B">
        <input type="number" id="c14" placeholder="Cable"> 
        <input type="number" id="c15" placeholder="Retencion 1-10">
        <input type="number" id="c16" placeholder="Crucetas">
        <div class="btn-group">
            <button onclick="enviar('guardar')" style="background:var(--highlight)">Guardar Nuevo</button>
            <button onclick="enviar('actualizar')" style="background:var(--accent); color: #000;">Actualizar Fila</button>
            <button onclick="limpiar()" style="background:#64748b">Limpiar</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="table-container">
            <table>
                <thead><tr><th>Día</th><th>Tiket</th><th>Del.</th><th>Oval</th><th>ADSS</th><th>Ret.</th><th>Cad.</th><th>Sup.</th><th>Gan.</th><th>Fel.</th><th>Evi.</th><th>Torn.</th><th>M.3B</th><th>M.2B</th><th>Cab.</th><th>Ret.</th><th>Cruc.</th><th>Acción</th></tr></thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
        <div id="resumen-container">
            <div class="panel"><h3>Totales</h3><div id="totales"></div></div>
            <div class="panel"><h3>Stock en Embalaje</h3><div id="conversiones"></div></div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwYTtsxSyojw38m3g7BH-j5fwKLs5LpDb1kZSeRV72dIqu_EMqwE8LMloD5o4lC0BL-/exec";
        const nombresCompletos = ["", "", "", "Metros Oval", "Metros ADSS", "Retencion OV", "Cadenas", "Supas", "Ganchos", "Feleje", "Evillas", "Tornillo N7", "Mordaza 3B", "Mordaza 2B", "Cable", "Retencion 1-10", "Crucetas"];
        const reglas = {
            3: { u: "Bobinas", f: 1000 },
            4: { u: "Bobinas", f: 4000 },
            5: { u: "Bolsas", f: 10 },
            6: { u: "Bolsas", f: 50 },
            10: { u: "Bolsas", f: 100 }
        };
        let dataGlobal = [];

        function cargar() {
            fetch(URL).then(r => r.json()).then(data => {
                dataGlobal = data;
                let tbody = document.getElementById('cuerpo');
                let tot = new Array(17).fill(0);
                tbody.innerHTML = "";
                data.slice(1).forEach((row, idx) => {
                    let tr = document.createElement('tr');
                    let d = new Date(row[0]);
                    tr.innerHTML = `<td onclick="cargarForm(${idx+1})" style="cursor:pointer; color:var(--accent); text-decoration:underline">${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</td>`;
                    for(let i=1; i<17; i++) {
                        let val = row[i] || 0;
                        let esNumerico = i > 2;
                        let numVal = Number(val);
                        let clase = (esNumerico && numVal > 0) ? 'class="val-high"' : '';
                        tr.innerHTML += `<td ${clase}>${val}</td>`;
                        if(esNumerico) tot[i] += numVal;
                    }
                    tr.innerHTML += `<td><button onclick="enviar('eliminar','${row[1]}')" style="background:transparent; color:#ef4444; font-size:16px;">✕</button></td>`;
                    tbody.appendChild(tr);
                });
                document.getElementById('totales').innerHTML = tot.map((v,i) => i >= 3 ? `<div class="total-item"><span>${nombresCompletos[i]}:</span> <b>${v}</b></div>` : '').join('');
                let convHtml = "";
                for (let i in reglas) {
                    let total = tot[i];
                    let cantidad = Math.floor(total / reglas[i].f);
                    let resto = total % reglas[i].f;
                    convHtml += `<div class="total-item"><span>${nombresCompletos[i]}:</span> <b>${cantidad > 0 ? cantidad + " " + reglas[i].u : ""} ${resto > 0 ? "+ " + resto : (cantidad === 0 ? "0" : "")}</b></div>`;
                }
                document.getElementById('conversiones').innerHTML = convHtml;
            });
        }

        function limpiar() { for(let i=0; i<17; i++) document.getElementById('c'+i).value = ""; }
        function cargarForm(idx) { 
            let row = dataGlobal[idx]; 
            let d = new Date(row[0]);
            document.getElementById('c0').value = d.toISOString().split('T')[0];
            for(let i=1; i<17; i++) document.getElementById('c'+i).value = row[i]; 
        }
        function enviar(accion, tiket = "") {
            let datos = { accion: accion, tiket: tiket || document.getElementById('c1').value };
            if(accion !== "eliminar") {
                let vals = [];
                for(let i=0; i<17; i++) vals.push(document.getElementById('c'+i).value);
                datos.valores = vals;
            }
            fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify(datos) })
            .then(() => { setTimeout(cargar, 1500); });
        }
        cargar();
    </script>
</body>
</html>
