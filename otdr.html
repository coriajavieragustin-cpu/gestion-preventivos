<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTDR Pro - Auditoría Visual & Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-omnivore/0.3.4/leaflet-omnivore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    
    <style>
        :root { 
            --bg: #0b0d12; --win: #141720; --border: #262b36; --text: #d1d6e0; 
            --accent: #00ff41; --cyan: #00ffff; --crit-color: #ff1744; --cut-color: #7a0000; 
        }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; margin: 0; background-color: var(--bg); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
            padding: 6px; box-sizing: border-box; color: var(--text); 
        }
        
        .top-bar { display: flex; gap: 10px; align-items: center; background: var(--win); padding: 8px; border: 1px solid var(--border); margin-bottom: 6px; border-radius: 4px; flex-shrink: 0; }
        select { background: #1c202b; color: var(--accent); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; outline: none; }

        .top-layout { display: grid; grid-template-columns: 0.8fr 340px 1.2fr; height: 50vh; gap: 6px; margin-bottom: 6px; flex-shrink: 0; }
        .window { background: var(--win); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; border-radius: 4px; position: relative; }
        .header { background: #1c202b; padding: 8px 12px; font-size: 11px; color: #8e96a3; border-bottom: 1px solid var(--border); text-transform: uppercase; font-weight: bold; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.5px; }
        
        #map { background: #000; flex-grow: 1; cursor: crosshair; }
        #otdrCanvas { background: #000; flex-grow: 1; width: 100% !important; cursor: grab; }
        #otdrCanvas:active { cursor: grabbing; }
        
        .clear-measure { position: absolute; bottom: 10px; left: 10px; z-index: 1000; background: var(--win); color: var(--text); border: 1px solid var(--border); padding: 5px; font-size: 9px; cursor: pointer; border-radius: 3px; text-transform: uppercase; }

        .info-content { padding: 8px; overflow-y: auto; background: #0c0e14; flex-grow: 1; }
        .info-card { padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); position: relative; background: var(--win); }
        .info-card h4 { margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--accent); padding-bottom: 4px; }

        .fiber-visual { 
            position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; 
            border-radius: 50%; border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            background: #000; 
        }
        .fiber-core { 
            width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
            animation: blink-color 1.2s infinite ease-in-out; 
        }

        @keyframes blink-color {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px currentColor; }
            50% { opacity: 0.4; transform: scale(0.85); box-shadow: 0 0 1px currentColor; }
        }

        .bottom-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); border-radius: 4px; }
        .table-scroll { overflow: auto; flex-grow: 1; background: #0c0e14; }

        .table-scroll::-webkit-scrollbar, .info-content::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scroll::-webkit-scrollbar-track, .info-content::-webkit-scrollbar-track { background: #0c0e14; }
        .table-scroll::-webkit-scrollbar-thumb, .info-content::-webkit-scrollbar-thumb { background: #2c3242; border-radius: 4px; }
        .table-scroll::-webkit-scrollbar-thumb:hover, .info-content::-webkit-scrollbar-thumb:hover { background: #3f475e; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; }
        th { background: #181b24; color: #8e96a3; padding: 10px 8px; border-bottom: 1px solid var(--border); border-right: 1px solid #222630; position: sticky; top: 0; z-index: 10; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
        td { padding: 8px; border-bottom: 1px solid #191c24; text-align: center; border-right: 1px solid #191c24; white-space: nowrap; transition: background 0.2s; }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }
        
        .row-selected td { background: #17263d !important; border-bottom: 1px solid #243b5e; }
        .crit { color: #ffffff !important; font-weight: bold; background: var(--crit-color) !important; box-shadow: inset 0 0 4px rgba(0,0,0,0.4); }
        .cut-fiber { color: #ff9999 !important; font-weight: bold; background: var(--cut-color) !important; box-shadow: inset 0 0 4px rgba(0,0,0,0.4); }

        .custom-checkbox {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border: 1px solid #4f5769;
            background: #141720;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .custom-checkbox.checked {
            background: #1e3d59;
            border-color: var(--cyan);
        }
        .custom-checkbox svg {
            width: 10px;
            height: 10px;
            fill: none;
            stroke: var(--cyan);
            stroke-width: 3;
            display: none;
        }
        .custom-checkbox.checked svg {
            display: block;
        }

        .btn-dl-otdr {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #1c202b;
            color: #a3aab6;
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-dl-otdr:hover {
            background: #252b3a;
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .map-label { background: rgba(0, 0, 0, 0.85); border: 1px solid var(--accent); color: #fff; font-weight: bold; font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }

        #loadingOTDR { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 20; color: var(--cyan); font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .btn-manual { background: #222; color: var(--cyan); border: 1px solid var(--border); font-size: 9px; cursor: pointer; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
        .btn-zoom-reset { background: #2a2f3d; color: #fff; border: 1px solid var(--border); font-size: 9px; cursor: pointer; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-right: 6px; display: none; }
        .btn-zoom-reset:hover { background: #3f475e; color: var(--cyan); }
        
        .btn-sheet { background: #107c41; color: #ffffff; border: 1px solid #0d6836; font-size: 10px; font-weight: bold; cursor: pointer; padding: 4px 8px; border-radius: 3px; display: inline-flex; align-items: center; gap: 4px; text-decoration: none; margin-left: 10px; transition: background 0.2s; }
        .btn-sheet:hover { background: #0b592e; }
    </style>
</head>
<body>

<div class="top-bar">
    <span style="font-size: 11px; font-weight: bold; color: #fff;">PROYECTO:</span>
    <select id="sheetPicker" onchange="loadSheet(this.value)">
        <option>Cargando hojas...</option>
    </select>
    <span style="font-size: 10px; color: #666; margin-left: auto;">Corte Crítico: >= 0.50 dB | Pelo Cortado: 0.00 dB</span>
    
    <a href="https://docs.google.com/spreadsheets/d/1DJoUIQBUofmiTiAb_nxBScd3wpuOL1AIeIXYum4HLIk/edit?usp=drive_link" target="_blank" class="btn-sheet">
        📊 VER SPREADSHEET
    </a>
</div>

<div class="top-layout">
    <div class="window">
        <div class="header">Mapa de Infraestructura y Traza</div>
        <div id="map"></div>
        <button class="clear-measure" onclick="resetMeasurement()">Limpiar Medida</button>
    </div>

    <div class="window">
        <div class="header">Detalle Técnico de la Fibra</div>
        <div class="info-content" id="infoPanel"></div>
    </div>

    <div class="window">
        <div class="header">
            <span>Análisis Reflectometría (.SOR)</span>
            <div style="display: flex; align-items: center;">
                <button id="resetZoomBtn" class="btn-zoom-reset" onclick="resetOtdrZoom()">🏠 VER COMPLETO</button>
                <button class="btn-manual" onclick="document.getElementById('manualFile').click()">📂 CARGAR</button>
            </div>
            <input type="file" id="manualFile" accept=".sor" hidden onchange="cargarArchivoManual(this)">
        </div>
        <div id="loadingOTDR">PROCESANDO TRAZA...</div>
        <canvas id="otdrCanvas"></canvas>
    </div>
</div>

<div class="bottom-section">
    <div class="header">Base de Datos Técnica Activa</div>
    <div class="table-scroll">
        <table id="mainTable">
            <thead id="headRow"></thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<script>
    const KML_URL = "https://coriajavieragustin-cpu.github.io/gestion-preventivos/mapas/Infraestructura.kml";
    const API_BASE = "https://script.google.com/macros/s/AKfycby3S3npwNYt4NA8oEk-vHB4jvJuKQkrmgzSL3tq24nhii8YYsGfKEko_HBSiMSscicxzw/exec";

    const COLORS = {
        "azul": "#0055ff", "naranja": "#ff8800", "verde": "#00cc00", "marron": "#8b4513",
        "gris": "#808080", "blanco": "#ffffff", "rojo": "#ff0000", "negro": "#111111",
        "amarillo": "#ffff00", "violeta": "#9900ff", "rosa": "#ff66cc", "celeste": "#00ffff"
    };

    const CHART_LINE_COLORS = ["#00ffff", "#ff00ff", "#ffff00", "#00ff41", "#ff4500", "#8a2be2", "#ff1493", "#00bfff"];

    let fullData = [], currentHeaders = [], attenuationCols = [], selectedIndices = [0], map = null, otdrChart = null;
    let measurePoints = [], measureMarkers = [], measureLine = null, kmlLayer = null;
    let loadedTraces = {}; 

    async function autoLoadOTDR(url, rowIndex, labelName) {
        if (!url || !url.includes("http")) return;
        document.getElementById('loadingOTDR').style.display = 'flex';
        try {
            let fileIdMatch = url.match(/[-\w]{25,}/);
            if (!fileIdMatch) throw new Error("ID de archivo no válido");
            let fileId = fileIdMatch[0];
            const proxyUrl = `${API_BASE}?action=getOtdrFile&fileId=${fileId}`;
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error("Error en la respuesta del proxy Apps Script");
            const json = await res.json();
            if (!json.success) throw new Error(json.error || "Error al obtener archivo binario");
            const binaryString = atob(json.base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            processSor(bytes.buffer, rowIndex, labelName);
        } catch (e) { console.error("Error en la carga automática del OTDR:", e); } 
        finally { document.getElementById('loadingOTDR').style.display = 'none'; }
    }

    function cargarArchivoManual(input) {
        const file = input.files[0];
        if (!file) return;
        document.getElementById('loadingOTDR').style.display = 'flex';
        const reader = new FileReader();
        reader.onload = (e) => { processSor(e.target.result, "manual_" + Date.now(), file.name); document.getElementById('loadingOTDR').style.display = 'none'; };
        reader.readAsArrayBuffer(file);
    }

    function processSor(buffer, rowIndex, labelName) {
        const view = new DataView(buffer);
        const content = new TextDecoder('ascii').decode(buffer);
        const dataKey = "DataPts";
        const dataPos = content.indexOf(dataKey);
        if (dataPos === -1) return;
        const sampDist = 1.02; 
        const numPoints = view.getUint32(dataPos + dataKey.length, true);
        const startOffset = dataPos + dataKey.length + 4;
        const pts = []; const lbls = [];
        const maxLimit = Math.min(numPoints, 12000);
        for (let i = 120; i < maxLimit; i++) {
            const bytePos = startOffset + (i * 2);
            if (bytePos + 2 <= buffer.byteLength) {
                let db = view.getUint16(bytePos, true) / 1000;
                if (db > 0.5 && db < 55) { pts.push(db); lbls.push(((i * sampDist) / 1000).toFixed(3)); }
            }
        }
        loadedTraces[rowIndex] = { pts: pts, lbls: lbls, label: labelName };
        renderMultiOTDR();
    }

    function renderMultiOTDR() {
        const ctx = document.getElementById('otdrCanvas').getContext('2d');
        if (otdrChart) otdrChart.destroy();
        document.getElementById('resetZoomBtn').style.display = 'none';
        let longestLabels = [];
        selectedIndices.forEach(idx => { if (loadedTraces[idx] && loadedTraces[idx].lbls.length > longestLabels.length) longestLabels = loadedTraces[idx].lbls; });
        let datasets = []; let colorIdx = 0;
        selectedIndices.forEach(idx => {
            if (loadedTraces[idx]) {
                let color = CHART_LINE_COLORS[colorIdx % CHART_LINE_COLORS.length];
                datasets.push({ label: loadedTraces[idx].label, data: loadedTraces[idx].pts, borderColor: color, borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.05 });
                colorIdx++;
            }
        });
        if (datasets.length === 0) return;
        otdrChart = new Chart(ctx, {
            type: 'line', data: { labels: longestLabels, datasets: datasets },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: true, grid: { color: '#14161d' }, ticks: { color: '#666', font: { size: 9 } } }, x: { ticks: { color: '#666', maxTicksLimit: 10, font: { size: 9 } }, grid: { display: false } } },
                plugins: { legend: { display: true, labels: { color: '#d1d1d1', font: { size: 9 }, boxWidth: 12 } }, zoom: { zoom: { wheel: { enabled: true, speed: 0.08 }, pinch: { enabled: true }, mode: 'xy', onZoomComplete: function() { document.getElementById('resetZoomBtn').style.display = 'inline-block'; } }, pan: { enabled: true, mode: 'xy', threshold: 10, onPanComplete: function() { document.getElementById('resetZoomBtn').style.display = 'inline-block'; } } } }
            }
        });
    }

    function resetOtdrZoom() { if (otdrChart) { otdrChart.resetZoom(); document.getElementById('resetZoomBtn').style.display = 'none'; } }

    function initMap() {
        const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        map = L.map('map', { center: [-27.469, -58.830], zoom: 12, layers: [satellite], doubleClickZoom: false });
        L.control.layers({ "Satélite": satellite, "Mapa Oscuro": dark }, null, { position: 'topright' }).addTo(map);
        map.on('click', function(e) {
            const point = e.latlng;
            measurePoints.push(point);
            const marker = L.circleMarker(point, { radius: 4, color: '#ff1744', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            measureMarkers.push(marker);
            if (measurePoints.length > 1) {
                if (measureLine) map.removeLayer(measureLine);
                measureLine = L.polyline(measurePoints, {color: '#ff1744', weight: 3, dashArray: '5, 8'}).addTo(map);
                let totalDist = 0;
                for (let i = 0; i < measurePoints.length - 1; i++) totalDist += measurePoints[i].distanceTo(measurePoints[i+1]);
                L.popup().setLatLng(point).setContent(`<b>Distancia de Traza:</b> ${totalDist.toFixed(1)} m`).openOn(map);
            }
        });
        kmlLayer = L.geoJson(null, { style: () => ({ color: '#00ffff', weight: 4, opacity: 0.6 }), pointToLayer: (feature, latlng) => L.circleMarker(latlng, { radius: 7, fillColor: "#00ff41", color: "#000", weight: 1, fillOpacity: 0.9 }), onEachFeature: (feature, layer) => { if (feature.properties) { const nombre = feature.properties.name || ""; const desc = (feature.properties.description || "").replace(/<[^>]*>/g, ''); layer.bindTooltip(`<b>${nombre}</b>${desc ? '<br>'+desc : ''}`, { direction: 'top', className: 'map-label', offset: [0, -5] }); } } });
        omnivore.kml(KML_URL, null, kmlLayer).on('ready', () => { if(kmlLayer.getBounds().isValid()) map.fitBounds(kmlLayer.getBounds()); }).addTo(map);
    }

    function resetMeasurement() { if (measureLine) map.removeLayer(measureLine); measureMarkers.forEach(m => map.removeLayer(m)); measurePoints = []; measureMarkers = []; map.closePopup(); }

    async function init() {
        initMap();
        try {
            const res = await fetch(`${API_BASE}?action=getSheets`);
            const sheets = await res.json();
            document.getElementById('sheetPicker').innerHTML = sheets.map(s => `<option value="${s}">${s}</option>`).join('');
            loadSheet(sheets[0]);
        } catch(e) { console.error("Error al iniciar App:", e); }
    }

    async function loadSheet(name) {
        try {
            const res = await fetch(`${API_BASE}?sheet=${encodeURIComponent(name)}`);
            const json = await res.json();
            fullData = json.data; currentHeaders = json.headers;
            attenuationCols = currentHeaders.filter(h => h.includes('(') || h.startsWith('FA'));
            buildTableHead(); selectedIndices = [0]; loadedTraces = {}; render(); triggerOtdrLoad(0);
        } catch(e) { console.error("Error al cargar datos de hoja:", e); }
    }

    function buildTableHead() {
        const hr = document.getElementById('headRow');
        let html = `<th style="width: 30px;">✔</th>`;
        currentHeaders.forEach(h => { const dist = h.match(/\(([^)]+)\)/); html += `<th>${h.replace(/\s*\(.*\)/, "")}${dist ? `<br><small style="color:var(--accent)">${dist[1]}m</small>` : ''}</th>`; });
        hr.innerHTML = html;
    }

    function render() {
        const gb = document.getElementById('gridBody'); gb.innerHTML = '';
        fullData.forEach((d, i) => {
            const isS = selectedIndices.includes(i);
            const pKey = (d.PELO || "").toString().toLowerCase().trim();
            let row = document.createElement('tr');
            if(isS) row.className = 'row-selected';
            let cells = `<td><div class="custom-checkbox ${isS ? 'checked' : ''}" onclick="event.stopPropagation(); handleRowSelection(${i});"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div></td>`;
            currentHeaders.forEach(h => {
                let val = d[h]; let style = ""; let cls = "";
                if(h === "BUFFER") style = `background:${COLORS[(d.BUFFER||"").toLowerCase().trim()] || "#222"}; color:#fff; font-weight:bold`;
                if(h === "PELO") { const cP = COLORS[pKey] || "#222"; style = `background:${cP}; color:${(pKey === "blanco" || pKey === "amarillo") ? "#000" : "#fff"}; font-weight:bold`; }
                
                if(attenuationCols.includes(h)) {
                    let num = parseFloat(val);
                    if (val !== "" && val !== null && num === 0) { 
                        cls = "cut-fiber"; val = "FIN"; 
                    } else if(num > 0.5) { 
                        cls = "crit"; val = num.toFixed(2); 
                    } else { 
                        val = (isNaN(num) || val === "" || val === null) ? "-" : num.toFixed(2); 
                    }
                }
                
                if ((h.toUpperCase().includes("OTDR") || h.toUpperCase() === "IMAGEN") && val && val.toString().includes("http")) { 
                    cells += `<td><a href="${val}" target="_blank" class="btn-dl-otdr" onclick="event.stopPropagation();">📥 .SOR</a></td>`; 
                } else { 
                    cells += `<td style="${style}" class="${cls}">${val}</td>`; 
                }
            });
            row.innerHTML = cells;
            row.onclick = () => { handleRowSelection(i); };
            gb.appendChild(row);
        });
        updateDashboard();
    }

    function handleRowSelection(idx) {
        if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
        else selectedIndices.push(idx);
        render();
        if (selectedIndices.includes(idx) && !loadedTraces[idx]) triggerOtdrLoad(idx);
        else renderMultiOTDR();
    }

    function triggerOtdrLoad(idx) {
        let d = fullData[idx]; if (!d) return;
        for (let header of currentHeaders) {
            if (header.toUpperCase().includes("OTDR") || header.toUpperCase() === "IMAGEN") {
                let linkOTDR = d[header];
                if (linkOTDR && linkOTDR.toString().includes("http")) {
                    autoLoadOTDR(linkOTDR, idx, `Pelo ${d.PELO} (${d.BUFFER || 'Tubo'})`); break; 
                }
            }
        }
    }

    function updateDashboard() {
        const infoPanel = document.getElementById('infoPanel');
        if (kmlLayer) { kmlLayer.eachLayer(l => { if(l.setStyle) { if (l instanceof L.CircleMarker) l.setStyle({ fillColor: "#00ff41", color: "#000", weight: 1 }); else l.setStyle({ color: '#00ffff', weight: 4, opacity: 0.6 }); } }); }
        if (selectedIndices.length === 0) { infoPanel.innerHTML = '<div style="color:#666; font-size:11px; padding:10px;">Seleccione una o más fibras para auditar.</div>'; if (otdrChart) { otdrChart.destroy(); otdrChart = null; } return; }
        selectedIndices.forEach(idx => {
            attenuationCols.forEach(col => {
                let num = parseFloat(fullData[idx][col]);
                if (num === 0 || num > 0.5) {
                    const idBuscado = col.replace(/\s*\(.*\)/, "").trim().toUpperCase();
                    kmlLayer.eachLayer(l => {
                        const nombreYDesc = ( (l.feature.properties.name || "") + " " + (l.feature.properties.description || "") ).toUpperCase();
                        if (nombreYDesc.includes(idBuscado)) { l.setStyle({ fillColor: "#ff1744", color: "#fff", weight: 3 }); l.openTooltip(); }
                    });
                }
            });
        });
        infoPanel.innerHTML = selectedIndices.map(idx => {
            const bC = COLORS[(fullData[idx].BUFFER || "").toLowerCase().trim()] || "#333";
            const pC = COLORS[(fullData[idx].PELO || "").toLowerCase().trim()] || "#555";
            return `<div class="info-card"><div class="fiber-visual" style="border-color: ${bC}"><div class="fiber-core" style="background-color: ${pC}; color: ${pC}"></div></div><h4>PELO ${fullData[idx].PELO} (Tubo ${fullData[idx].BUFFER || 'N/A'})</h4><div style="font-size: 11px; line-height: 1.6;">${currentHeaders.filter(h => !attenuationCols.includes(h) && fullData[idx][h]).map(h => `<div><b style="color:#888;">${h}:</b> ${fullData[idx][h]}</div>`).join('')}</div></div>`;
        }).join('');
    }
    window.onload = init;
</script>
</body>
</html>
