<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTDR Pro - Auditoría Visual & Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-omnivore/0.3.4/leaflet-omnivore.min.js"></script>
    
    <style>
        :root { --bg: #050608; --win: #111318; --border: #2a2d35; --text: #d1d1d1; --accent: #00ff41; --cyan: #00ffff; --crit-color: #ff1744; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 6px; box-sizing: border-box; color: var(--text); }
        
        .top-bar { display: flex; gap: 10px; align-items: center; background: var(--win); padding: 8px; border: 1px solid var(--border); margin-bottom: 6px; border-radius: 4px; flex-shrink: 0; }
        select { background: #1a1c22; color: var(--accent); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; outline: none; }

        /* Diseño ajustado: Mapa más grande sin el monitor central */
        .top-layout { display: grid; grid-template-columns: 1fr 350px; height: 55vh; gap: 6px; margin-bottom: 6px; flex-shrink: 0; }
        .window { background: var(--win); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; border-radius: 4px; }
        .header { background: #1a1c22; padding: 6px 12px; font-size: 10px; color: #888; border-bottom: 1px solid var(--border); text-transform: uppercase; font-weight: bold; }
        
        #map { background: #000; flex-grow: 1; cursor: crosshair; }
        
        .info-content { padding: 8px; overflow-y: auto; background: #08090c; flex-grow: 1; }
        .info-card { padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .info-card h4 { margin: 0 0 5px 0; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--accent); }

        .bottom-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); border-radius: 4px; }
        .table-scroll { overflow: auto; flex-grow: 1; background: #08090c; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #15171d; color: #777; padding: 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid #14151a; text-align: center; border-right: 1px solid #14151a; }
        
        .row-selected { background: #1c2533 !important; }
        .crit { color: #ffffff !important; font-weight: bold; background: var(--crit-color) !important; }

        .map-label {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--accent);
            color: #fff;
            font-weight: bold;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <span style="font-size: 11px; font-weight: bold; color: #fff;">PROYECTO:</span>
    <select id="sheetPicker" onchange="loadSheet(this.value)">
        <option>Cargando hojas...</option>
    </select>
    <span style="font-size: 10px; color: #666; margin-left: auto;">Traza y Cajas Activas | Medición: Click en mapa</span>
</div>

<div class="top-layout">
    <!-- Mapa expandido -->
    <div class="window">
        <div class="header">Mapa de Infraestructura y Traza</div>
        <div id="map"></div>
    </div>

    <!-- Detalle Técnico lateral -->
    <div class="window">
        <div class="header">Detalle Técnico</div>
        <div class="info-content" id="infoPanel"></div>
    </div>
</div>

<div class="bottom-section">
    <div class="header">Base de Datos Técnica (Corte Crítico: 0.5 dB)</div>
    <div class="table-scroll">
        <table id="mainTable">
            <thead id="headRow"></thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<script>
    const KML_URL = "https://coriajavieragustin-cpu.github.io/gestion-preventivos/mapas/Infraestructura.kml";
    const API_BASE = "https://script.google.com/macros/s/AKfycbxcxP8Nvkd7uYZyyHYxOyx9zQjRr153xAmgMngp3rwQk-pJiRzU-2blQnhfLIo3K71PNw/exec";

    const COLORS = {
        "azul": "#0055ff", "naranja": "#ff8800", "verde": "#00cc00", "marron": "#8b4513",
        "gris": "#808080", "blanco": "#ffffff", "rojo": "#ff0000", "negro": "#111111",
        "amarillo": "#ffff00", "violeta": "#9900ff", "rosa": "#ff66cc", "celeste": "#00ffff"
    };

    let fullData = [], currentHeaders = [], attenuationCols = [], selectedIndices = [0], map = null;
    let measurePoints = [], measureLine = null, kmlLayer = null;

    function initMap() {
        map = L.map('map').setView([-27.469, -58.830], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Herramienta de Medición
        map.on('click', function(e) {
            if (measurePoints.length >= 2) {
                if (measureLine) map.removeLayer(measureLine);
                measurePoints = [];
            }
            measurePoints.push(e.latlng);
            if (measurePoints.length === 2) {
                measureLine = L.polyline(measurePoints, {color: '#ff1744', weight: 3, dashArray: '5, 10'}).addTo(map);
                const d = measurePoints[0].distanceTo(measurePoints[1]).toFixed(1);
                L.popup().setLatLng(e.latlng).setContent(`<b>Distancia:</b> ${d} m`).openOn(map);
            }
        });

        // Capa de Infraestructura (Puntos y Líneas/Trazas)
        kmlLayer = L.geoJson(null, {
            style: function(feature) {
                return { color: '#00ffff', weight: 4, opacity: 0.6 }; // Estilo para la traza (líneas)
            },
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, { 
                radius: 7, 
                fillColor: "#00ff41", 
                color: "#000", 
                weight: 1, 
                fillOpacity: 0.9 
            }),
            onEachFeature: (feature, layer) => {
                if (feature.properties) {
                    const nombre = feature.properties.name || "";
                    const desc = (feature.properties.description || "").replace(/<[^>]*>/g, '');
                    const tooltipContent = `<b>${nombre}</b>${desc ? '<br>'+desc : ''}`;
                    
                    layer.bindTooltip(tooltipContent, { 
                        permanent: false, 
                        direction: 'top', 
                        className: 'map-label', 
                        offset: [0, -5] 
                    });
                }
            }
        });

        omnivore.kml(KML_URL, null, kmlLayer)
            .on('ready', () => map.fitBounds(kmlLayer.getBounds()))
            .addTo(map);
    }

    async function init() {
        initMap();
        try {
            const res = await fetch(`${API_BASE}?action=getSheets`);
            const sheets = await res.json();
            document.getElementById('sheetPicker').innerHTML = sheets.map(s => `<option value="${s}">${s}</option>`).join('');
            loadSheet(sheets[0]);
        } catch(e) { console.error(e); }
    }

    async function loadSheet(name) {
        try {
            const res = await fetch(`${API_BASE}?sheet=${encodeURIComponent(name)}`);
            const json = await res.json();
            fullData = json.data;
            currentHeaders = json.headers;
            attenuationCols = currentHeaders.filter(h => h.includes('(') || h.startsWith('FA'));
            buildTableHead();
            render();
        } catch(e) { console.error(e); }
    }

    function buildTableHead() {
        const hr = document.getElementById('headRow');
        let html = `<th>✔</th>`;
        currentHeaders.forEach(h => {
            const dist = h.match(/\(([^)]+)\)/);
            html += `<th>${h.replace(/\s*\(.*\)/, "")}${dist ? `<br><small style="color:var(--accent)">${dist[1]}m</small>` : ''}</th>`;
        });
        hr.innerHTML = html;
    }

    function render() {
        const gb = document.getElementById('gridBody');
        gb.innerHTML = '';
        fullData.forEach((d, i) => {
            const isS = selectedIndices.includes(i);
            const pKey = (d.PELO || "").toString().toLowerCase().trim();
            let row = document.createElement('tr');
            if(isS) row.className = 'row-selected';
            
            let cells = `<td><input type="checkbox" ${isS?'checked':''}></td>`;
            currentHeaders.forEach(h => {
                let val = d[h] || "";
                let style = ""; let cls = "";
                if(h === "BUFFER") style = `background:${COLORS[(d.BUFFER||"").toLowerCase().trim()] || "#222"}; color:#fff; font-weight:bold`;
                if(h === "PELO") style = `color:${COLORS[pKey] || "#555"}; font-weight:bold`;
                if(attenuationCols.includes(h)) {
                    let num = parseFloat(val) || 0;
                    if(num > 0.5) cls = "crit";
                    val = num === 0 ? "-" : num.toFixed(2);
                }
                cells += `<td style="${style}" class="${cls}">${val}</td>`;
            });
            row.innerHTML = cells;
            row.onclick = (e) => { if(e.target.type !== 'checkbox') toggle(i); };
            gb.appendChild(row);
        });
        updateDashboard();
    }

    function toggle(idx) {
        selectedIndices = selectedIndices.includes(idx) ? selectedIndices.filter(i => i !== idx) : [...selectedIndices, idx];
        render();
    }

    function updateDashboard() {
        const infoPanel = document.getElementById('infoPanel');
        
        // Resetear visual del Mapa (Cajas y Traza)
        if (kmlLayer) {
            kmlLayer.eachLayer(l => { 
                if(l.setStyle) {
                    // Si es punto (círculo)
                    if (l instanceof L.CircleMarker) {
                        l.setStyle({ fillColor: "#00ff41", color: "#000", weight: 1 });
                    } else {
                        // Si es línea (traza)
                        l.setStyle({ color: '#00ffff', weight: 4, opacity: 0.6 });
                    }
                }
            });
        }

        if (selectedIndices.length === 0) {
            infoPanel.innerHTML = '<div style="color:#666; font-size:11px; padding:10px;">Seleccione una fila para analizar.</div>';
            return;
        }

        // Marcar Fallas Críticas en el Mapa
        selectedIndices.forEach(idx => {
            attenuationCols.forEach(col => {
                if (parseFloat(fullData[idx][col]) > 0.5) {
                    const idBuscado = col.replace(/\s*\(.*\)/, "").trim().toUpperCase();
                    kmlLayer.eachLayer(l => {
                        const nombreYDesc = ( (l.feature.properties.name || "") + " " + (l.feature.properties.description || "") ).toUpperCase();
                        if (nombreYDesc.includes(idBuscado)) {
                            l.setStyle({ fillColor: "#ff1744", color: "#fff", weight: 3 });
                            l.openTooltip(); // Abre el cartel automáticamente si hay falla
                        }
                    });
                }
            });
        });

        // Actualizar Panel de Información lateral
        infoPanel.innerHTML = selectedIndices.map(idx => `
            <div class="info-card">
                <h4>PELO ${fullData[idx].PELO}</h4>
                <div style="font-size: 10px;">
                    ${currentHeaders.filter(h => !attenuationCols.includes(h) && fullData[idx][h]).map(h => `
                        <div><b>${h}:</b> ${fullData[idx][h]}</div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    window.onload = init;
</script>
</body>
</html>
