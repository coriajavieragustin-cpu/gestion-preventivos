<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTDR Pro - Dashboard Técnico</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        :root { --bg: #050608; --win: #111318; --border: #2a2d35; --text: #d1d1d1; --accent: #00ff41; --cyan: #00ffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 6px; box-sizing: border-box; color: var(--text); }
        
        /* Sección Superior: Gráfico + Cuadro de Info */
        .top-layout { display: grid; grid-template-columns: 1fr 300px; height: 40vh; gap: 6px; margin-bottom: 6px; }
        .window { background: var(--win); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; border-radius: 4px; }
        .header { background: #1a1c22; padding: 6px 12px; font-size: 10px; color: #888; border-bottom: 1px solid var(--border); text-transform: uppercase; font-weight: bold; }
        
        .chart-wrapper { background: #000; flex-grow: 1; padding: 12px; position: relative; }
        
        /* Estilos del Cuadro de Información Lateral */
        .info-content { padding: 10px; overflow-y: auto; background: #08090c; flex-grow: 1; }
        .info-card { background: #161a21; border-left: 3px solid var(--accent); padding: 8px; margin-bottom: 8px; border-radius: 2px; font-size: 11px; }
        .info-card h4 { margin: 0 0 5px 0; font-size: 12px; color: #fff; display: flex; justify-content: space-between; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .info-item { color: #888; font-size: 9px; text-transform: uppercase; }
        .info-val { color: #eee; font-size: 11px; font-weight: bold; margin-bottom: 4px; }

        /* Sección Inferior: Tabla */
        .bottom-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); border-radius: 4px; }
        .table-scroll { overflow: auto; flex-grow: 1; background: #08090c; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #15171d; color: #777; padding: 8px; border-bottom: 1px solid var(--border); text-align: center; position: sticky; top: 0; z-index: 10; }
        .dist-sub { display: block; font-size: 9px; color: var(--accent); font-weight: normal; margin-top: 2px; }
        td { padding: 8px; border-bottom: 1px solid #14151a; text-align: center; border-right: 1px solid #14151a; }
        
        .row-selected { background: #1c2533 !important; }
        .crit { color: #ffffff !important; font-weight: bold; background: #ff1744 !important; }
        input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); }
    </style>
</head>
<body>

<div class="top-layout">
    <div class="window">
        <div class="header">Monitor OTDR - Análisis de Atenuación</div>
        <div class="chart-wrapper"><canvas id="otdrChart"></canvas></div>
    </div>

    <div class="window">
        <div class="header">Información de Pelos</div>
        <div class="info-content" id="infoPanel">
            <div style="color:#555; text-align:center; margin-top:20px;">Seleccione hilos en la tabla para ver detalles</div>
        </div>
    </div>
</div>

<div class="bottom-section">
    <div class="header">Planilla de Certificaciones</div>
    <div class="table-scroll">
        <table>
            <thead>
                <tr id="headRow">
                    <th style="width:30px">✔</th>
                    <th>BUFFER</th>
                    <th>PELO</th>
                    <th>PUERTO ODF</th>
                    <th>OLT</th>
                    <th>RAMAL</th>
                    <th>ODF</th>
                </tr>
            </thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycby8sfyLk-wzEeFdE8VybET5llJqFlyaNhuKyApezHqKWcv_hkQqFBQOhSDzU1AVgqGlXw/exec";
    
    const COLORS = {
        "azul": "#0055ff", "naranja": "#ff8800", "verde": "#00cc00", "marron": "#8b4513",
        "gris": "#808080", "blanco": "#ffffff", "rojo": "#ff0000", "negro": "#333333",
        "amarillo": "#ffff00", "violeta": "#9900ff", "rosa": "#ff66cc", "celeste": "#00ffff"
    };

    const COLS_CONFIG = {
        "FA00 (1490)": "FA00", "FA01 (1690)": "FA01", "FA1 (1960)": "FA1",
        "FA2 (2360)": "FA2", "FA3 (2820)": "FA3", "FA4 (3680)": "FA4",
        "FA5 (4400)": "FA5", "FA6 (4470)": "FA6", "FA7 (5130)": "FA7",
        "FA8 (5440)": "FA8", "FA7BY1 (5700)": "F7B1", "FA7 BY2 (5870)": "F7B2",
        "FA9 (6070)": "FA9", "FAA (6680)": "FAA", "FAA BY (7690)": "FAABY",
        "FAB (7180)": "FAB", "FAC (7620)": "FAC", "FAD (8090)": "FAD"
    };

    let data = [];
    let chart = null;
    let selectedIndices = [0];

    async function load() {
        try {
            const res = await fetch(API);
            data = await res.json();
            const hr = document.getElementById('headRow');
            Object.keys(COLS_CONFIG).forEach(key => {
                let th = document.createElement('th');
                const dist = key.match(/\(([^)]+)\)/);
                th.innerHTML = `${COLS_CONFIG[key]} <span class="dist-sub">${dist ? dist[1]+'m' : ''}</span>`;
                hr.appendChild(th);
            });
            render();
        } catch(e) { console.error("Error:", e); }
    }

    function render() {
        const gb = document.getElementById('gridBody');
        gb.innerHTML = '';

        data.forEach((d, i) => {
            const isS = selectedIndices.includes(i);
            const pKey = (d.PELO || "").toLowerCase().trim();
            const bKey = (d.BUFFER || "").toLowerCase().trim();
            const cP = COLORS[pKey] || "#555";
            const cB = COLORS[bKey] || "#555";

            let row = document.createElement('tr');
            if(isS) row.className = 'row-selected';
            
            row.innerHTML = `
                <td><input type="checkbox" ${isS?'checked':''}></td>
                <td style="background:${cB}; color:#fff; font-weight:bold">${d.BUFFER || ''}</td>
                <td style="color:${cP}; font-weight:bold">${d.PELO || ''}</td>
                <td style="color:var(--cyan)">${d["Puerto ODF"] || '--'}</td>
                <td style="color:var(--accent)">${d.OLT || '-'}</td>
                <td>${d.Ramal || '--'}</td>
                <td style="color:#aaa">${d.ODF || '--'}</td>
            `;
            
            Object.keys(COLS_CONFIG).forEach(k => {
                let v = parseFloat(d[k]) || 0;
                row.innerHTML += `<td class="${v > 0.5 ? 'crit' : ''}">${v === 0 ? '-' : v.toFixed(2)}</td>`;
            });

            row.onclick = (e) => { if(e.target.type !== 'checkbox') toggle(i); };
            row.querySelector('input').onchange = () => toggle(i);
            gb.appendChild(row);
        });
        updateDashboard();
    }

    function toggle(idx) {
        if(selectedIndices.includes(idx)) {
            if(selectedIndices.length > 1) selectedIndices = selectedIndices.filter(i => i !== idx);
        } else {
            selectedIndices.push(idx);
        }
        render();
    }

    function updateDashboard() {
        // Actualizar Gráfico
        const chartLabels = Object.keys(COLS_CONFIG).map(k => {
            const d = k.match(/\(([^)]+)\)/);
            return [COLS_CONFIG[k], d ? d[1]+'m' : ''];
        });

        const datasets = selectedIndices.map(idx => {
            const d = data[idx];
            return {
                label: `Pelo ${d.PELO}`,
                data: Object.keys(COLS_CONFIG).map(k => parseFloat(d[k]) || 0),
                backgroundColor: COLORS[(d.PELO || "").toLowerCase().trim()] || '#00ff41',
                borderWidth: 1
            };
        });

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('otdrChart'), {
            type: 'bar',
            data: { labels: chartLabels, datasets: datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#fff', font: {size: 9} } },
                    y: { min: 0, max: 2.0, ticks: { color: '#888' } }
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: { l: { type: 'line', yMin: 0.5, yMax: 0.5, borderColor: 'red', borderWidth: 2, borderDash: [5, 5] } } }
                }
            }
        });

        // Actualizar Cuadro de Información Lateral
        const infoPanel = document.getElementById('infoPanel');
        infoPanel.innerHTML = '';
        
        selectedIndices.forEach(idx => {
            const d = data[idx];
            const pKey = (d.PELO || "").toLowerCase().trim();
            const colorPelo = COLORS[pKey] || "#eee";
            
            const card = document.createElement('div');
            card.className = 'info-card';
            card.style.borderLeftColor = colorPelo;
            card.innerHTML = `
                <h4>Pelo ${d.PELO} <span style="font-size:10px; color:#555;">ID: ${idx+1}</span></h4>
                <div class="info-grid">
                    <div><div class="info-item">Buffer</div><div class="info-val">${d.BUFFER}</div></div>
                    <div><div class="info-item">Puerto ODF</div><div class="info-val" style="color:var(--cyan)">${d["Puerto ODF"]}</div></div>
                    <div><div class="info-item">OLT</div><div class="info-val" style="color:var(--accent)">${d.OLT}</div></div>
                    <div><div class="info-item">Ramal</div><div class="info-val">${d.Ramal}</div></div>
                </div>
            `;
            infoPanel.appendChild(card);
        });
    }
    load();
</script>
</body>
</html>
