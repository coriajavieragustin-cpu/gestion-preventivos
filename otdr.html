<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTDR Pro - Auditoría Visual & Mapa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-omnivore/0.3.4/leaflet-omnivore.min.js"></script>
    
    <style>
        :root { --bg: #050608; --win: #111318; --border: #2a2d35; --text: #d1d1d1; --accent: #00ff41; --cyan: #00ffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 6px; box-sizing: border-box; color: var(--text); }
        
        .top-bar { display: flex; gap: 10px; align-items: center; background: var(--win); padding: 8px; border: 1px solid var(--border); margin-bottom: 6px; border-radius: 4px; }
        select { background: #1a1c22; color: var(--accent); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; outline: none; }

        .top-layout { display: grid; grid-template-columns: 1fr 1fr 300px; height: 45vh; gap: 6px; margin-bottom: 6px; }
        .window { background: var(--win); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; border-radius: 4px; }
        .header { background: #1a1c22; padding: 6px 12px; font-size: 10px; color: #888; border-bottom: 1px solid var(--border); text-transform: uppercase; font-weight: bold; }
        
        #map { background: #000; flex-grow: 1; }
        .chart-wrapper { background: #000; flex-grow: 1; position: relative; }
        
        .info-content { padding: 8px; overflow-y: auto; background: #08090c; flex-grow: 1; }
        .info-card { padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .info-card h4 { margin: 0 0 5px 0; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2); }

        .bottom-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); border-radius: 4px; }
        .table-scroll { overflow: auto; flex-grow: 1; background: #08090c; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #15171d; color: #777; padding: 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid #14151a; text-align: center; border-right: 1px solid #14151a; }
        
        .row-selected { background: #1c2533 !important; }
        .crit { color: #ffffff !important; font-weight: bold; background: #ff1744 !important; }
    </style>
</head>
<body>

<div class="top-bar">
    <span style="font-size: 11px; font-weight: bold; color: #fff;">PROYECTO / ZONA:</span>
    <select id="sheetPicker" onchange="loadSheet(this.value)">
        <option>Cargando hojas...</option>
    </select>
</div>

<div class="top-layout">
    <div class="window">
        <div class="header">Infraestructura de Red (GitHub KML)</div>
        <div id="map"></div>
    </div>

    <div class="window">
        <div class="header">Monitor de Atenuación OTDR</div>
        <div class="chart-wrapper"><canvas id="otdrChart"></canvas></div>
    </div>

    <div class="window">
        <div class="header">Detalle Técnico</div>
        <div class="info-content" id="infoPanel"></div>
    </div>
</div>

<div class="bottom-section">
    <div class="header">Base de Datos Técnica (Corte Crítico: 0.5 dB)</div>
    <div class="table-scroll">
        <table id="mainTable">
            <thead id="headRow"></thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<script>
    // URL de tu archivo en GitHub
    const KML_URL = "https://coriajavieragustin-cpu.github.io/gestion-preventivos/mapas/Infraestructura.kml";
    const API_BASE = "https://script.google.com/macros/s/AKfycbxcxP8Nvkd7uYZyyHYxOyx9zQjRr153xAmgMngp3rwQk-pJiRzU-2blQnhfLIo3K71PNw/exec";

    const COLORS = {
        "azul": "#0055ff", "naranja": "#ff8800", "verde": "#00cc00", "marron": "#8b4513",
        "gris": "#808080", "blanco": "#ffffff", "rojo": "#ff0000", "negro": "#111111",
        "amarillo": "#ffff00", "violeta": "#9900ff", "rosa": "#ff66cc", "celeste": "#00ffff"
    };

    let fullData = [], currentHeaders = [], attenuationCols = [], chart = null, selectedIndices = [0], map = null;

    function initMap() {
        // Inicializar el mapa
        map = L.map('map').setView([-27.469, -58.830], 12);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Capa de diseño para los elementos del KML
        const customLayer = L.geoJson(null, {
            style: { color: '#00ffff', weight: 4, opacity: 0.7 },
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                radius: 6, fillColor: "#00ff41", color: "#000", weight: 1, fillOpacity: 0.8
            }),
            onEachFeature: (feature, layer) => {
                if (feature.properties && feature.properties.name) {
                    layer.bindPopup(`<b>Elemento:</b> ${feature.properties.name}`);
                }
            }
        });

        // Cargar desde GitHub directamente (sin problemas de CORS)
        omnivore.kml(KML_URL, null, customLayer)
            .on('ready', function() {
                map.fitBounds(customLayer.getBounds());
                console.log("Infraestructura cargada desde GitHub");
            })
            .on('error', (e) => console.error("Error al cargar el archivo desde mapas/Infraestructura.kml", e))
            .addTo(map);
    }

    async function init() {
        initMap();
        try {
            const res = await fetch(`${API_BASE}?action=getSheets`);
            const sheets = await res.json();
            document.getElementById('sheetPicker').innerHTML = sheets.map(s => `<option value="${s}">${s}</option>`).join('');
            loadSheet(sheets[0]);
        } catch(e) { console.error("Error inicial:", e); }
    }

    async function loadSheet(name) {
        try {
            const res = await fetch(`${API_BASE}?sheet=${encodeURIComponent(name)}`);
            const json = await res.json();
            fullData = json.data;
            currentHeaders = json.headers;
            attenuationCols = currentHeaders.filter(h => h.includes('(') || h.startsWith('FA'));
            buildTableHead();
            render();
        } catch(e) { console.error("Error cargando hoja:", e); }
    }

    function buildTableHead() {
        const hr = document.getElementById('headRow');
        let html = `<th>✔</th>`;
        currentHeaders.forEach(h => {
            const dist = h.match(/\(([^)]+)\)/);
            html += `<th>${h.replace(/\s*\(.*\)/, "")} ${dist ? `<span style="color:var(--accent); font-size:9px; display:block;">${dist[1]}m</span>` : ''}</th>`;
        });
        hr.innerHTML = html;
    }

    function render() {
        const gb = document.getElementById('gridBody');
        gb.innerHTML = '';
        fullData.forEach((d, i) => {
            const isS = selectedIndices.includes(i);
            const pKey = (d.PELO || "").toString().toLowerCase().trim();
            const colorPelo = COLORS[pKey] || "#555";
            const colorBuffer = COLORS[(d.BUFFER || "").toString().toLowerCase().trim()] || "#222";

            let row = document.createElement('tr');
            if(isS) row.className = 'row-selected';
            
            let cells = `<td><input type="checkbox" ${isS?'checked':''}></td>`;
            currentHeaders.forEach(h => {
                let val = d[h] || "";
                let style = "";
                let cls = "";
                if(h === "BUFFER") style = `background:${colorBuffer}; color:${(colorBuffer==='#ffffff'||colorBuffer==='#ffff00')?'#000':'#fff'}; font-weight:bold`;
                if(h === "PELO") style = `color:${colorPelo}; font-weight:bold`;
                if(attenuationCols.includes(h)) {
                    let num = parseFloat(val) || 0;
                    if(num > 0.5) cls = "crit";
                    val = num === 0 ? "-" : num.toFixed(2);
                }
                cells += `<td style="${style}" class="${cls}">${val}</td>`;
            });
            row.innerHTML = cells;
            row.onclick = (e) => { if(e.target.type !== 'checkbox') toggle(i); };
            gb.appendChild(row);
        });
        updateDashboard();
    }

    function toggle(idx) {
        if(selectedIndices.includes(idx)) {
            if(selectedIndices.length > 1) selectedIndices = selectedIndices.filter(i => i !== idx);
        } else {
            selectedIndices.push(idx);
        }
        render();
    }

    function updateDashboard() {
        const datasets = selectedIndices.map(idx => ({
            label: `Pelo ${fullData[idx].PELO || idx}`,
            data: attenuationCols.map(h => parseFloat(fullData[idx][h]) || 0),
            backgroundColor: COLORS[(fullData[idx].PELO || "").toString().toLowerCase().trim()] || '#00ff41',
            borderWidth: 1
        }));

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('otdrChart'), {
            type: 'bar',
            data: { labels: attenuationCols.map(h => h.split(' ')[0]), datasets: datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#fff', font: {size: 8} } },
                    y: { min: 0, max: 2.0, ticks: { color: '#888' } }
                },
                plugins: { 
                    legend: { display: false },
                    annotation: { annotations: { l: { type: 'line', yMin: 0.5, yMax: 0.5, borderColor: 'red', borderWidth: 2, borderDash: [5, 5] } } }
                }
            }
        });

        const infoPanel = document.getElementById('infoPanel');
        infoPanel.innerHTML = '';
        selectedIndices.forEach(idx => {
            const d = fullData[idx];
            const card = document.createElement('div');
            card.className = 'info-card';
            card.innerHTML = `
                <h4>PELO ${d.PELO}</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                    ${currentHeaders.filter(h => !attenuationCols.includes(h)).map(h => `
                        <div style="font-size: 8px; opacity: 0.7;">${h}: <span style="font-size: 10px; font-weight: bold; color:#fff">${d[h] || '--'}</span></div>
                    `).join('')}
                </div>`;
            infoPanel.appendChild(card);
        });
    }

    window.onload = init;
</script>
</body>
</html>
