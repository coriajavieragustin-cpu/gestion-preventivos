<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - Panel Principal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #1a1c23; color: #e0e0e0; }
        h1 { color: #ffffff; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .panel-busqueda { background: #252830; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        #inputBusqueda { width: 100%; padding: 10px; background: #1a1c23; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }

        .form-container { background: #252830; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; }
        
        #tabla-contenedor { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #252830; }
        td { border: 1px solid #333; padding: 12px; text-align: center; color: #ccc; }
        th { background-color: #34495e !important; color: #ffffff !important; font-weight: bold; border: 1px solid #333; border-bottom: 3px solid #3498db !important; padding: 15px; text-transform: uppercase; }
        tr:hover { background-color: #30343f; }

        .color-verde { background-color: #008000 !important; color: #fff !important; }
        .color-rojo { background-color: #b30000 !important; color: #fff !important; }
    </style>
</head>
<body>

    <h1>Stock Cuadrilla FO1 FO2 FO3</h1>

    <div class="panel-busqueda">
        <input type="text" id="inputBusqueda" placeholder="🔍 Buscar por Nombre de Artículo o IDArt..." onkeyup="filtrarTabla()">
    </div>

    <div class="form-container">
        <h3 style="color: #3498db;">Cargar nueva tanda de columnas:</h3>
        <textarea id="bloqueDatos" placeholder="Pega aquí la columna del Excel" style="width:100%; height:80px; background:#1a1c23; color:#fff; border:1px solid #444; border-radius:4px;"></textarea>
        <button onclick="enviarTanda()" style="margin-top:10px; padding:10px 20px; cursor:pointer; background:#3498db; color:white; border:none; border-radius:4px;">Añadir Nueva Tanda</button>
    </div>

    <div id="tabla-contenedor">
        <table id="tabla"></table>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbwX5oitesQ7wfRrZVhQTB2hu2js793Z1Wg19RoBMqarf88PEtAfXeoYvG68h_hbB4NGSQ/exec";
        let datosGlobales = []; 
        let colNombre = 1; // Default
        let colID = 2;     // Default

        function cargarTabla() {
            fetch(URL_API)
                .then(res => res.json())
                .then(datos => {
                    datosGlobales = datos;
                    // Detectar columnas automáticamente
                    const cabeceras = datos[0];
                    cabeceras.forEach((c, i) => {
                        if (c.toString().trim() === "Nombre del Artículo") colNombre = i;
                        if (c.toString().trim() === "IDArt") colID = i;
                    });
                    renderizarTabla(datos);
                });
        }

        function renderizarTabla(datos) {
            const tabla = document.getElementById('tabla');
            tabla.innerHTML = "";
            const encabezados = datos[0];
            const indicesObjetivo = [];
            encabezados.forEach((nombre, index) => {
                if (nombre === "D FO1" || nombre === "D FO2" || nombre === "D FO3") indicesObjetivo.push(index);
            });

            datos.forEach((fila, indexFila) => {
                const tr = document.createElement('tr');
                fila.forEach((celda, indexCol) => {
                    const elemento = document.createElement(indexFila === 0 ? 'th' : 'td');
                    if (typeof celda === 'string' && celda.includes('T') && celda.includes(':')) {
                        const fecha = new Date(celda);
                        elemento.textContent = !isNaN(fecha.getTime()) ? fecha.toLocaleDateString('es-ES') : celda;
                    } else {
                        elemento.textContent = celda;
                        if (indexFila > 0 && indicesObjetivo.includes(indexCol)) {
                            const valor = parseFloat(celda);
                            if (!isNaN(valor) && valor !== 0) elemento.classList.add(valor > 0 ? 'color-rojo' : 'color-verde');
                        }
                    }
                    tr.appendChild(elemento);
                });
                tabla.appendChild(tr);
            });
        }

        function filtrarTabla() {
            const filtro = document.getElementById('inputBusqueda').value.toLowerCase();
            const datosFiltrados = datosGlobales.filter((fila, index) => {
                if (index === 0) return true;
                // Busca en las columnas detectadas dinámicamente
                const valNombre = fila[colNombre] ? fila[colNombre].toString().toLowerCase() : "";
                const valID = fila[colID] ? fila[colID].toString().toLowerCase() : "";
                return valNombre.includes(filtro) || valID.includes(filtro);
            });
            renderizarTabla(datosFiltrados);
        }

        function enviarTanda() {
            const texto = document.getElementById('bloqueDatos').value;
            const datosColumna = texto.split('\n');
            fetch(URL_API, { method: 'POST', body: JSON.stringify(datosColumna) })
            .then(() => { alert("Tanda añadida"); document.getElementById('bloqueDatos').value = ""; cargarTabla(); });
        }

        cargarTabla();
    </script>
</body>
</html>
