<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL PGP V1.8 - Gestión y Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --sidebar-bg: #1e1e2d;
            --tec-color: #58a6ff;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #238636;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b949e;
        }

        .navbar-dark.bg-dark-custom { 
            background-color: #161b22; 
            border-bottom: 1px solid var(--border-color);
        }

        .card { 
            background-color: var(--card-bg); 
            color: var(--text-main);
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            margin-bottom: 15px; 
        }

        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            color: white;
            font-size: 0.85rem;
            padding: 0.45rem 0.75rem;
            border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            border-color: var(--tec-color);
            color: white;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.15);
        }

        .tecnicos-selector-box {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px;
            max-height: 140px;
            overflow-y: auto;
        }
        .tecnicos-selector-box .form-check {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tecnicos-selector-box .form-check-label {
            font-size: 0.85rem;
            cursor: pointer;
            padding-top: 2px;
        }

        .btn-sync { 
            background-color: var(--accent); 
            color: white; 
            font-weight: 600; 
            border: none; 
            padding: 6px 16px; 
            border-radius: 6px; 
            transition: all 0.2s ease; 
        }
        .btn-sync:hover { background-color: #2ea043; transform: translateY(-1px); }

        .sync-status-bar { 
            background: #161b22; 
            padding: 10px 16px; 
            border-top: 3px solid var(--accent); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.85rem; 
            margin-bottom: 20px; 
            border-radius: 0 0 8px 8px;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        /* Tabla Estilizada */
        .table-responsive-custom { 
            max-height: 55vh; 
            overflow-y: auto; 
            background: var(--card-bg); 
            border-radius: 8px; 
        }
        .table { 
            color: var(--text-main); 
            margin-bottom: 0; 
            border-collapse: separate;
            border-spacing: 0;
        }
        .table th {
            background-color: #21262d !important;
            color: #f0f6fc !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            padding: 10px 8px !important;
            border-bottom: 2px solid var(--border-color) !important;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .table td {
            padding: 8px 8px !important;
            vertical-align: middle;
            border-bottom: 1px solid #21262d;
        }
        .table-hover tbody tr:hover { 
            background-color: #1f242c !important; 
        }
         
        .status-ausencia { 
            background-color: #2b230a !important; 
            color: #e3b341 !important; 
        }
        .status-ausencia td { border-bottom: 1px solid #3e3312; }
        .status-ausencia tr:hover { background-color: #332a0c !important; }
         
        /* Botones de acción */
        .btn-del, .btn-dup { 
            border: none; 
            background: #21262d; 
            cursor: pointer; 
            font-size: 0.95rem; 
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 2px;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-dup:hover { background-color: #30363d; transform: scale(1.08); }
        .btn-del:hover { background-color: #da3637; transform: scale(1.08); }

        #loaderGlobal { display: none; position: fixed; top: 15px; right: 20px; z-index: 2000; border-radius: 6px; }

        .mini-card-tec { 
            background: #21262d; 
            border-left: 4px solid var(--tec-color); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
         
        .chart-container { position: relative; height: 320px; width: 100%; }
        .txt-calculo { 
            font-family: monospace; 
            font-size: 0.72rem; 
            color: var(--text-muted); 
            display: block; 
            margin-top: 6px; 
            border-top: 1px solid var(--border-color); 
            padding-top: 4px; 
        }

        .col-actividad { 
            max-width: 240px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }
    </style>
</head>
<body>

<div id="loaderGlobal" class="badge bg-warning text-dark p-2 shadow">⌛ Procesando...</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom shadow-sm mb-0">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#" style="color: var(--tec-color)">📊 Panel de tareas Tecnicos <span class="fw-light small" style="color: var(--text-muted)">v1.8</span></a>
        <select id="selectorMes" class="form-select form-select-sm w-auto me-2" onchange="cargarDatosNube()">
            <option value="Enero">Enero</option><option value="Febrero">Febrero</option>
            <option value="Marzo">Marzo</option><option value="Abril">Abril</option>
            <option value="Mayo">Mayo</option><option value="Junio">Junio</option>
            <option value="Julio">Julio</option><option value="Agosto">Agosto</option>
            <option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option>
            <option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
        </select>
    </div>
</nav>

<div class="container-fluid px-3">
    <div class="sync-status-bar shadow-sm">
        <div class="small fw-bold text-muted" id="infoMesActual">Cargando info...</div>
        <div class="sync-time" id="ultimaActualizacion" style="color: var(--tec-color)">--:--:-- <span>✅</span></div>
    </div>

    <div class="row">
        <div class="col-lg-3">
            <div class="card p-3 border-top border-primary border-4">
                <h6 class="fw-bold mb-3 border-bottom pb-2 text-uppercase small" style="color: var(--tec-color)">📝 Editor de Registro</h6>
                <form id="registroForm">
                    <div class="mb-2">
                        <label class="small fw-bold mb-1">FECHA</label>
                        <input type="date" id="formFecha" class="form-control form-control-sm" required onchange="actualizarDiaEnFormulario()">
                        <div id="infoDia" class="badge bg-primary mt-1 w-100" style="display:none; font-size: 0.7rem;"></div>
                    </div>
                    <div class="mb-2">
                        <label class="small fw-bold mb-1">CATEGORÍA</label>
                        <select id="formCat" class="form-select form-select-sm">
                            <option value="ARMADO / REPARACION DE CAJAS">ARMADO / REPARACION DE CAJAS</option>
                            <option value="ARMADO Y SANGRADO DE CAJAS">ARMADO Y SANGRADO DE CAJAS</option>
                            <option value="AUSENCIA">AUSENCIA</option>
                            <option value="AUSENCIA PARCIAL">AUSENCIA PARCIAL</option>
                            <option value="BOTELLAS/ARMADO">BOTELLAS/ARMADO</option>
                            <option value="CABLEADO TRONCAL / SUBTRONCAL">CABLEADO TRONCAL / SUBTRONCAL</option>
                            <option value="CABLEADOS DISTRIBUCION">CABLEADOS DISTRIBUCION</option>
                            <option value="CONEXIONES CLIENTES">CONEXIONES CLIENTES</option>
                            <option value="DESMONTES DE FIBRA">DESMONTES DE FIBRA</option>
                            <option value="HORAS EXTRAS">HORAS EXTRAS</option>
                            <option value="PLANTADO DE POSTES CON RETIRO">PLANTADO DE POSTES CON RETIRO</option>
                            <option value="PLANTADO DE POSTES">PLANTADO DE POSTES</option>
                            <option value="PREVENTIVOS">PREVENTIVOS</option>
                            <option value="RELEVAMIENTOS DE CAJAS">RELEVAMIENTOS DE CAJAS</option>
                            <option value="REPLANTADO DE POSTES/TUTOR">REPLANTADO DE POSTES/TUTOR</option>
                            <option value="TRASLADO PAQUETERIA / TALLER">TRASLADO PAQUETERIA / TALLER</option>
                            <option value="SPLITER DAÑADO">SPLITER DAÑADO</option>
                            <option value="CAJA MALA SEÑAL">CAJA MALA SEÑAL</option>
                            <option value="INSTALACIONES CLIENTES">INSTALACIONES CLIENTES</option>
                            <option value="MANTENIMIENTO CLIENTES">MANTENIMIENTO CLIENTES</option>
                            <option value="TRABAJOS NOC">TRABAJOS NOC</option>
                            <option value="DIA NO LABORAL">DIA NO LABORAL</option>
                        </select>
                    </div>
                    
                    <div class="mb-2">
                        <label class="small fw-bold text-warning mb-1">TÉCNICOS (Soporta varios)</label>
                        <div class="tecnicos-selector-box" id="contenedorCheckboxesTecnicos">
                            <div class="form-check">
                                <input class="form-check-input chk-tecnico" type="checkbox" value="Vicens Cristian" id="tec_vicens">
                                <label class="form-check-label text-white" for="tec_vicens">Vicens Cristian</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input chk-tecnico" type="checkbox" value="Alegre Maximiliano" id="tec_alegre">
                                <label class="form-check-label text-white" for="tec_alegre">Alegre Maximiliano</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input chk-tecnico" type="checkbox" value="Gonzalez Fernando" id="tec_gonzalez">
                                <label class="form-check-label text-white" for="tec_gonzalez">Gonzalez Fernando</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input chk-tecnico" type="checkbox" value="Rodriguez Gabriel" id="tec_rodriguez">
                                <label class="form-check-label text-white" for="tec_rodriguez">Rodriguez Gabriel</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input chk-tecnico" type="checkbox" value="Emma Calvo" id="tec_emma">
                                <label class="form-check-label text-white" for="tec_emma">Emma Calvo</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input chk-tecnico" type="checkbox" value="Altamirano Cesar" id="tec_altamirano">
                                <label class="form-check-label text-white" for="tec_altamirano">Altamirano Cesar</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="small fw-bold mb-1">ACTIVIDAD</label>
                        <textarea id="formAct" class="form-control form-control-sm" rows="2" placeholder="Escribí la tarea aquí..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">PUNTAJE</label>
                        <input type="number" id="formPts" class="form-control form-control-sm" value="0" step="0.1">
                    </div>
                    <div class="row g-2">
                        <div class="col-8">
                            <button type="submit" class="btn btn-primary btn-sm fw-bold w-100 py-2" style="border-radius: 6px;">💾 GUARDAR</button>
                        </div>
                        <div class="col-4">
                            <button type="button" class="btn btn-outline-danger btn-sm fw-bold w-100 py-2" style="border-radius: 6px;" onclick="limpiarFormularioCompleto()" title="Limpiar todos los campos">🧹 </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card p-3 shadow-sm overflow-auto" style="max-height: 400px; border-top: 4px solid var(--tec-color);">
                <h6 class="fw-bold mb-3 small text-uppercase">📈 Resumen de Promedios (Col I)</h6>
                <div id="contenedorPromedios"></div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="card p-3 shadow-sm mb-3">
                <h6 class="fw-bold mb-3 small text-uppercase text-muted">📊 Ranking de Rendimiento</h6>
                <div class="chart-container">
                    <canvas id="graficoPromedios"></canvas>
                </div>
            </div>

            <div class="card p-3 shadow-sm">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                    <h6 class="fw-bold m-0 small text-uppercase text-muted">☁️ Registros en la Nube</h6>
                    <div class="d-flex gap-2 w-auto flex-grow-1 flex-md-grow-0" style="max-width: 400px;">
                        <input type="text" id="barraBusqueda" class="form-control form-control-sm" placeholder="🔍 Buscar técnico, tarea, categoría..." onkeyup="filtrarTablaLocal()">
                        <button class="btn-sync btn-sm text-nowrap" onclick="cargarDatosNube()">🔄 Sincronizar</button>
                    </div>
                </div>
                <div class="table-responsive-custom border border-secondary border-opacity-25 shadow-sm">
                    <table class="table table-sm table-hover mb-0" id="tablaDatos">
                        <thead class="small text-center">
                            <tr>
                                <th>FECHA</th><th>DÍA</th><th>CATEGORÍA</th><th>ACTIVIDAD</th><th>TÉCNICO</th><th>PTS</th><th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody class="small text-center"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxeZ_pOpH98ZufyGNCq_6BQx0H_F2cS6HUBaiq_QgKvl1TwUAO4dhmso0B498hFa22gDA/exec"; 
    let miGrafico = null;
    let datosLocales = []; 

    window.onload = () => {
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        document.getElementById('selectorMes').value = meses[new Date().getMonth()];
        document.getElementById('formFecha').valueAsDate = new Date();
        actualizarDiaEnFormulario();
        cargarDatosNube();
    };

    document.getElementById('registroForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const checkboxes = document.querySelectorAll('.chk-tecnico:checked');
        if (checkboxes.length === 0) {
            alert("Por favor, selecciona al menos un técnico.");
            return;
        }

        mostrarLoading(true);
        const fInput = document.getElementById('formFecha').value;
        const nombreDia = actualizarDiaEnFormulario();
        const category = document.getElementById('formCat').value;
        const actividad = document.getElementById('formAct').value;
        const puntaje = document.getElementById('formPts').value;
        const mesSeleccionado = document.getElementById('selectorMes').value;

        try {
            for (let i = 0; i < checkboxes.length; i++) {
                const tecnicoNombre = checkboxes[i].value;
                const payload = {
                    action: 'insertar',
                    mes: mesSeleccionado,
                    datos: [
                        fInput.split('-').reverse().join('/'), 
                        nombreDia, 
                        category, 
                        actividad, 
                        tecnicoNombre, 
                        puntaje, 
                        ""
                    ]
                };
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            }

            document.getElementById('formAct').value = "";
            document.getElementById('formPts').value = "0";
            document.getElementById('formAct').focus(); 
            
            setTimeout(cargarDatosNube, 1000);
        } catch (e) { 
            alert("Error al guardar los registros"); 
        } finally { 
            mostrarLoading(false); 
        }
    };

    function limpiarFormularioCompleto() {
        document.getElementById('formAct').value = "";
        document.getElementById('formPts').value = "0";
        document.getElementById('formFecha').valueAsDate = new Date();
        document.querySelectorAll('.chk-tecnico').forEach(chk => chk.checked = false);
        actualizarDiaEnFormulario();
    }

    async function cargarDatosNube() {
        mostrarLoading(true);
        const mesNombre = document.getElementById('selectorMes').value;
        const tbody = document.querySelector('#tablaDatos tbody');
        const contenedor = document.getElementById('contenedorPromedios');
        document.getElementById('barraBusqueda').value = "";
        
        try {
            const res = await fetch(`${WEB_APP_URL}?mes=${mesNombre}&nocache=${new Date().getTime()}`);
            let filas = await res.json();
            
            tbody.innerHTML = "";
            contenedor.innerHTML = "";
            let rankingData = [];

            if (filas.length > 1) {
                const datosResumen = filas.slice(21); 
                const listaTecnicos = ["Vicens Cristian", "Alegre Maximiliano", "Altamirano Cesar", "Emma Calvo", "Gonzalez Fernando", "Rodriguez Gabriel"];
                
                listaTecnicos.forEach(nombre => {
                    const filaTecnico = datosResumen.find(r => r[7] && r[7].toString().trim().toLowerCase() === nombre.toLowerCase());
                    const promedioDirecto = filaTecnico ? (parseFloat(filaTecnico[8]) || 0).toFixed(2) : "0.00";
                    const numFilaExcel = filaTecnico ? filas.indexOf(filaTecnico) + 1 : "N/A";

                    rankingData.push({ nombre, promedio: parseFloat(promedioDirecto) });

                    contenedor.innerHTML += `
                        <div class="mini-card-tec">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small fw-bold">${nombre}</span>
                                <span class="badge bg-primary" style="font-size: 0.9rem;">${promedioDirecto}</span>
                            </div>
                            <span class="txt-calculo">Leyendo Celda Excel: I${numFilaExcel}</span>
                        </div>`;
                });

                rankingData.sort((a,b) => b.promedio - a.promedio);
                renderizarGrafico(rankingData.map(r => r.nombre), rankingData.map(r => r.promedio));

                datosLocales = filas.slice(1).map((f, i) => ({ data: f, filaOriginal: i + 2 }))
                                           .filter(item => item.data[4] && item.data[4].toString().trim() !== "");

                [...datosLocales].reverse().forEach((item) => {
                    const fila = item.data;
                    let fRaw = fila[0].toString();
                    let fDisplay = fRaw.includes('T') ? fRaw.split('T')[0].split('-').reverse().join('/') : fRaw;
                    
                    const tr = document.createElement('tr');
                    if(fila[2].toString().toUpperCase().includes("AUSENCIA")) tr.className = "status-ausencia";
                    tr.innerHTML = `
                        <td>${fDisplay}</td><td>${fila[1]}</td><td>${fila[2]}</td>
                        <td class="col-actividad text-start small" title="${fila[3]}">${fila[3] || '-'}</td>
                        <td class="fw-bold" style="color: var(--tec-color)">${fila[4]}</td>
                        <td class="fw-bold">${fila[5]}</td>
                        <td>
                            <button class="btn-dup" title="Modificar" onclick="duplicarFilaLocal('${fila[0]}','${fila[2]}','${fila[4]}','${fila[3]}','${fila[5]}')">✏️</button>
                            <button class="btn-del" title="Eliminar" onclick="borrarFila(${item.filaOriginal})">🗑️</button>
                        </td>`;
                    tbody.appendChild(tr);
                });
            }
            document.getElementById('ultimaActualizacion').innerText = new Date().toLocaleTimeString();
            document.getElementById('infoMesActual').innerText = `${mesNombre} | Tabla detectada`;
        } catch (e) { console.error("Error:", e); } 
        finally { mostrarLoading(false); }
    }

    function filtrarTablaLocal() {
        const textoBusqueda = document.getElementById('barraBusqueda').value.toLowerCase();
        const filasTabla = document.querySelectorAll('#tablaDatos tbody tr');

        filasTabla.forEach(tr => {
            const contenidoTexto = tr.textContent.toLowerCase();
            if (contenidoTexto.includes(textoBusqueda)) {
                tr.style.display = "";
            } else {
                tr.style.display = "none";
            }
        });
    }

    async function borrarFila(nro) {
        if(!confirm("¿Eliminar la fila " + nro + " de la planilla?")) return;
        mostrarLoading(true);
        const mes = document.getElementById('selectorMes').value;
        try {
            await fetch(`${WEB_APP_URL}?action=eliminar&mes=${mes}&fila=${nro}`, { method: 'GET' });
            setTimeout(cargarDatosNube, 1000);
        } catch (e) { alert("Error al eliminar"); }
        finally { mostrarLoading(false); }
    }

    function renderizarGrafico(labels, valores) {
        const ctx = document.getElementById('graficoPromedios').getContext('2d');
        if (miGrafico) miGrafico.destroy();
        
        miGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'Promedio del Mes', 
                    data: valores, 
                    backgroundColor: '#58a6ff', 
                    borderRadius: 5, 
                    barThickness: 18 
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { 
                    x: { 
                        beginAtZero: true, 
                        grid: { display: false }, 
                        ticks: { display: false } 
                    }, 
                    y: { 
                        grid: { display: false }, 
                        ticks: { color: '#ffffff' } 
                    } 
                },
                plugins: { 
                    legend: { display: false } 
                }
            },
            plugins: [{
                id: 'labelsAlFinal',
                afterDatasetsDraw(chart) {
                    const { ctx, data } = chart;
                    ctx.save();
                    ctx.font = 'bold 12px Segoe UI';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    chart.getDatasetMeta(0).data.forEach((bar, index) => {
                        const val = data.datasets[0].data[index].toFixed(2);
                        ctx.fillText(val, bar.x + 8, bar.y);
                    });
                    ctx.restore();
                }
            }]
        });
    }

    function duplicarFilaLocal(f, cat, tec, act, pts) {
        let fechaISO = f.includes('T') ? f.split('T')[0] : (f.includes('/') ? f.split('/').reverse().join('-') : f);
        document.getElementById('formFecha').value = fechaISO;
        document.getElementById('formCat').value = cat;
        
        document.querySelectorAll('.chk-tecnico').forEach(chk => {
            chk.checked = (chk.value.toLowerCase() === tec.toLowerCase());
        });

        document.getElementById('formAct').value = act || "";
        document.getElementById('formPts').value = pts;
        actualizarDiaEnFormulario();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function actualizarDiaEnFormulario() {
        const f = document.getElementById('formFecha').value;
        if (!f) return "";
        const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const parts = f.split('-');
        const fecha = new Date(parts[0], parts[1]-1, parts[2]);
        const nom = dias[fecha.getDay()];
        document.getElementById('infoDia').innerText = "Día: " + nom;
        document.getElementById('infoDia').style.display = "block";
        return nom;
    }

    function mostrarLoading(s) { document.getElementById('loaderGlobal').style.display = s ? "block" : "none"; }
</script>
</body>
</html>
